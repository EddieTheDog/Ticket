<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Home311
  </title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  >

</head>

<body>

  <aside class="sidebar">

    <div class="logo">
      Home311
    </div>

    <nav>

      <a href="#">
        Dashboard
      </a>

      <a href="#">
        Tickets
      </a>

      <a href="#">
        Warnings
      </a>

      <a href="#">
        Removal
      </a>

    </nav>

  </aside>

  <main class="main">

    <header class="topbar">

      <div>

        <h1>
          Home311 Dashboard
        </h1>

        <p>
          Household Item Tracking
        </p>

      </div>

      <button id="newTicketBtn">
        + New Ticket
      </button>

    </header>

    <section class="stats">

      <div class="stat-card">

        <h2 id="activeCount">
          0
        </h2>

        <p>
          Active
        </p>

      </div>

      <div class="stat-card">

        <h2 id="resolvedCount">
          0
        </h2>

        <p>
          Resolved
        </p>

      </div>

    </section>

    <section class="section">

      <div class="section-header">

        <h2>
          Offense Presets
        </h2>

        <button id="addOffenseBtn">
          Add Offense
        </button>

      </div>

      <div id="offenseList">
      </div>

    </section>

    <section class="section">

      <div class="section-header">

        <h2>
          Tickets
        </h2>

      </div>

      <div id="ticketList">
      </div>

    </section>

  </main>

  <!-- MODAL -->

  <div
    class="modal hidden"
    id="ticketModal"
  >

    <div class="modal-content">

      <h2>
        Create Ticket
      </h2>

      <select id="ticketLevel">

        <option>
          Warning
        </option>

        <option>
          Violation
        </option>

        <option>
          Removal
        </option>

      </select>

      <select id="ticketOffense">
      </select>

      <textarea
        id="ticketNotes"
        placeholder="Notes..."
      ></textarea>

      <input
        type="number"
        id="ticketDays"
        placeholder="Days Until Removal"
      >

      <button id="createTicketBtn">
        Create Ticket
      </button>

    </div>

  </div>

  <script src="./js/app.js"></script>

</body>
</html>
