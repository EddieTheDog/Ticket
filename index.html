<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Home311 Dashboard</title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  />
</head>

<body>

  <aside class="sidebar">

    <div class="logo">
      Home311
    </div>

    <nav>

      <a href="#">
        Dashboard
      </a>

      <a href="#">
        Tickets
      </a>

      <a href="#">
        Offenses
      </a>

      <a href="#">
        Archive
      </a>

    </nav>

  </aside>

  <main class="main">

    <header class="topbar">

      <h1>
        Ticket Dashboard
      </h1>

      <button id="newTicketBtn">
        + New Ticket
      </button>

    </header>

    <section class="stats">

      <div class="stat-card">
        <h2 id="activeCount">
          0
        </h2>

        <p>
          Active Tickets
        </p>
      </div>

      <div class="stat-card">
        <h2 id="resolvedCount">
          0
        </h2>

        <p>
          Resolved
        </p>
      </div>

    </section>

    <section class="offense-manager">

      <div class="section-header">

        <h2>
          Offense Presets
        </h2>

        <button id="addOffenseBtn">
          Add Offense
        </button>

      </div>

      <div id="offenseList">
      </div>

    </section>

    <section class="tickets">

      <div class="section-header">

        <h2>
          Tickets
        </h2>

      </div>

      <div id="ticketList">
      </div>

    </section>

  </main>

  <script src="./js/app.js"></script>

</body>
</html>
